# ==================================================
# Portfolio Platform Configuration
# ==================================================

spring.application.name=portfolio-platform

# ==================================================
# Server Configuration
# ==================================================

server.port=${PORT:8080}

# ==================================================
# Active Profile
# ==================================================
# Defaults to "local", which loads application-local.properties
# (gitignored, holds real local dev secrets). In production,
# set SPRING_PROFILES_ACTIVE and the individual env vars below instead.

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==================================================
# MySQL Database Configuration
# ==================================================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio_platform}

spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================================
# Hibernate / JPA Configuration
# ==================================================

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

######################################################
# JWT Configuration
######################################################

jwt.secret=${JWT_SECRET:local-dev-secret-key-do-not-use-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

#########################################
# File Upload Configuration (Cloudinary)
#########################################

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

#########################################
# CORS Configuration
#########################################

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
