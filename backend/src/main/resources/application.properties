# ==================================================
# Portfolio Platform Configuration
# ==================================================

spring.application.name=portfolio-platform

# ==================================================
# Server Configuration
# ==================================================

server.port=8080

# ==================================================
# Active Profile
# ==================================================

spring.profiles.active=dev

# ==================================================
# MySQL Database Configuration
# ==================================================

spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_platform

spring.datasource.username=root

spring.datasource.password=Ekta@290304

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================================
# Hibernate / JPA Configuration
# ==================================================

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

######################################################
# JWT Configuration
######################################################

jwt.secret=portfolio-platform-super-secret-key-2026-change-this-in-production-very-secure
jwt.expiration=86400000

#########################################
# File Upload Configuration
#########################################

file.upload-dir=uploads

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
